<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RESTRO</title>
    <style>
        /* GLOBAL STYLES: 
           Resets default margins/padding and ensures all elements use border-box 
           so padding doesn't affect width calculations. 
        */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box; 
            color: #ffffff; 
        }

        /* BODY CONFIG: 
           The 1000vh height is critical; it creates a long "track" for the scroll 
           listener to map animations to (10x the screen height). 
        */
        body {
            background-color: #000;
            height: 1000vh;
            overflow-x: hidden; 
            font-family: 'Segoe UI', sans-serif; 
        }

        /* SCROLL CONTAINER: 
           Uses 'fixed' to keep the viewport stationary while the user scrolls 
           the invisible 1000vh body height. 
        */
        .scroll-container {
            position: fixed;
            top: 0;
            left: 0; 
            width: 100%; 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            overflow: hidden;
        }

        /* VIDEO BACKGROUND: 
           Layers the video at the very back (z-index: 1). 
        */
        .bg-video-container {
            position: absolute;
            top: 0;
            left: 0; 
            width: 100%; 
            height: 100%; 
            z-index: 1; 
            overflow: hidden;
        }

        /* VIDEO FIT: 
           Ensures the video covers the screen like a background-image (object-fit) 
           and applies a brightness filter to make text pop. 
        */
        .bg-video-container video {
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            object-fit: cover;
            filter: brightness(0.5);
        }

        /* TRANSITION LAYERS: 
           The 'bg-brown' and 'bg-white-page' are hidden (opacity 0) layers 
           that become visible via JS as the user scrolls deeper. 
        */
        .bg-brown {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%; 
            background-color: #3d2b1f; 
            z-index: 3; 
            opacity: 0;
        }

        .bg-white-page {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%; 
            background-color: #ffffff; 
            z-index: 15; 
            opacity: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            pointer-events: none;
            transition: background-color 0.4s ease;
        }

        /* WHY TEXT: 
           Styled for high impact. 'will-change' optimizes the browser 
           for the heavy transform/opacity animations handled in the scroll event. 
        */
        #why-text {
            color: #3d2b1f;
            font-family: 'Impact', 'Arial Black', sans-serif;
            font-weight: 900; 
            text-transform: uppercase; 
            white-space: nowrap; 
            opacity: 0;
            position: absolute;
            z-index: 20;
            will-change: transform, opacity, color;
        }

        /* IMAGE SLIDESHOW: 
           Positions the food images. They start at opacity 0 and 
           scale 0.2, then "explode" into view later. 
        */
        .slide-img {
            position: absolute;
            width: 320px;
            height: 240px;
            object-fit: cover;
            border-radius: 10px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            opacity: 0;
            will-change: transform, opacity;
        }

        /* NAVIGATION BAR: 
           Features 'backdrop-filter' for a glassmorphism effect. 
           The '.nav-black' class is added via JS to flip colors 
           when the background turns white. 
        */
        nav {
            position: fixed;
            top: 0; width: 100%; 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 20px 4%; z-index: 100;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px); 
            transition: background 0.3s, border-bottom 0.3s;
        }

        .nav-black {
            background: rgba(255, 255, 255, 0.8);
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
        }
        .nav-black a, .nav-black #nav-title-small { color: #000 !important; }
        .nav-black .brand-logo { filter: invert(1); }

        /* SIDE MENU: Handles the hidden drawer for the hamburger menu. */
        .side-menu {
            position: fixed;
            top: 0; right: -100%; width: 350px; height: 100vh; 
            background: rgba(20, 20, 20, 0.98); 
            z-index: 999; 
            display: flex; flex-direction: column; justify-content: center; 
            padding: 60px; transition: 0.6s cubic-bezier(0.77, 0, 0.175, 1);
        }
        .side-menu.active { right: 0; }
    </style>
</head>
<body>

    <nav id="navbar">
        <div class="brand-container">
            <img src="ex.jpg" alt="Logo" class="brand-logo" id="navLogo"> 
            <span id="nav-title-small">RESTRO</span>
        </div>
        <ul class="nav-links">
            <li><a href="#">Home</a></li> 
            <li><a href="#">Services</a></li> 
            <li><a href="#">About</a></li>
        </ul>
        <div class="menu-toggle" id="menuToggle" onclick="toggleMenu()"> 
            <div id="line1"></div> <div id="line2"></div> <div id="line3"></div>
        </div> 
    </nav>

    <div class="side-menu" id="sideMenu"> 
        <a href="#" onclick="toggleMenu()">✕ Close Menu</a> 
        <a href="#">Home</a>
        <a href="#">Reservations</a>
        <a href="#">Contact</a>
    </div>

    <div class="scroll-container"> 
        <div class="bg-video-container">
            <video autoplay muted loop playsinline id="bgVideo">
                <source src="Food Reel - Darío Idoate.mp4" type="video/mp4">
            </video>
            <div class="video-overlay"></div>
        </div>
        
        <div class="bg-brown" id="bgBrown"></div> 
        
        <div class="bg-white-page" id="bgWhite"> 
            <h2 id="why-text">WHY WE EXIST ?</h2> 
            <div class="slideshow-container">
                <img src="https://images.unsplash.com/photo-1514362545857-3bc16c4c7d1b?q=80&w=800" class="slide-img" id="img1">
                <img src="https://images.unsplash.com/photo-1559339352-11d035aa65de?q=80&w=800" class="slide-img" id="img2">
                <img src="https://images.unsplash.com/photo-1550966841-3ee7adac1af8?q=80&w=800" class="slide-img" id="img3">
            </div>
        </div>

        <div class="hero-content" id="heroContent"> 
            <h1 id="main-title"></h1>
            <p id="sub-text"></p> 
        </div>
    </div>

    <script>
        /* TYPEWRITER: Dynamically types out the hero text on page load. */
        function typeWriter(elementId, text, speed, callback) {
            let i = 0;
            const element = document.getElementById(elementId);
            function type() {
                if (i < text.length) {
                    if (text.substring(i, i + 4) === "<br>") {
                        element.innerHTML += "<br>"; i += 4;
                    } else {
                        element.innerHTML += text.charAt(i); i++;
                    }
                    setTimeout(type, speed);
                } else if (callback) callback();
            }
            type();
        }

        /* INITIALIZATION: Forces scroll to top and starts the typewriter sequence. */
        window.addEventListener('load', () => {
            window.scrollTo(0, 0);
            typeWriter("main-title", "RESTRO", 150, () => {
                typeWriter("sub-text", "Peak Hours Should Be Your<br>Most Profitable", 50);
            });
        });

        /* MENU TOGGLE: Handles the hamburger-to-X animation and drawer slide. */
        function toggleMenu() {
            document.getElementById('sideMenu').classList.toggle('active');
            document.getElementById('menuToggle').classList.toggle('open');
        }

        /* SCROLL ENGINE: 
           This is the "Brain" of the site. It calculates the percentage of 
           the total scroll (0 to 1) and updates every element's CSS accordingly.
        */
        window.addEventListener('scroll', () => { 
            const scrollPercent = window.scrollY / (document.body.offsetHeight - window.innerHeight);
            
            const title = document.getElementById('main-title');
            const subText = document.getElementById('sub-text');
            const bgBrown = document.getElementById('bgBrown');
            const bgWhite = document.getElementById('bgWhite');
            const whyText = document.getElementById('why-text');
            const navbar = document.getElementById('navbar');

            /* PHASE 1: Main title shrinks and fades out as user scrolls down. */
            const p1 = Math.min(scrollPercent * 3.33, 1);
            title.style.fontSize = `${12 * (1 - p1 * 0.85)}rem`;
            title.style.opacity = 1 - p1;

            /* PHASE 2: Tagline centers and brown background fades in. */
            bgBrown.style.opacity = Math.min(p1 * 1.5, 1);
            subText.style.transform = `translate(${-p1 * 42}vw, ${p1 * -35}vh) scale(${1 + p1})`;

            /* PHASE 3: White section and "Why We Exist" sequence (starts at 50% scroll). */
            if (scrollPercent > 0.5) { 
                const p3 = Math.min((scrollPercent - 0.5) / 0.2, 1);
                bgWhite.style.opacity = Math.min(p3 * 2, 1);
                
                /* THEME SWITCH: Flips navbar and text colors based on background contrast. */
                if (p3 >= 0.98) {
                    bgWhite.style.backgroundColor = "#3d2b1f";
                    whyText.style.color = "#ffffff";
                    navbar.classList.remove('nav-black');
                } else {
                    bgWhite.style.backgroundColor = "#ffffff";
                    whyText.style.color = "#3d2b1f";
                    navbar.classList.add('nav-black');
                }

                /* IMAGE SLIDESHOW LOGIC: 
                   Calculates entrance, sustain, and final positioning for 3 images. 
                   Images scale up (pop), hold, then move to their final grid spot.
                */
                if (scrollPercent > 0.7) {
                    const slideSection = (scrollPercent - 0.7) / 0.2;
                    const imgs = [document.getElementById('img1'), document.getElementById('img2'), document.getElementById('img3')];
                    const targetX = [-380, 0, 380];

                    imgs.forEach((img, index) => {
                        const start = index * 0.33;
                        const localProgress = Math.min(Math.max((slideSection - start) / 0.33, 0), 1);
                        
                        let opacity = 0, scale = 0.2, x = 0;

                        if (localProgress < 0.3) { // Entrance (Pop)
                            opacity = localProgress / 0.3;
                            scale = 0.2 + (opacity * 1.3);
                        } else if (localProgress < 0.7) { // Sustain
                            opacity = 1; scale = 1.5;
                        } else { // Move to Position
                            const fix = (localProgress - 0.7) / 0.3;
                            opacity = 1; scale = 1.5 - (fix * 0.5);
                            x = targetX[index] * fix;
                        }
                        
                        img.style.opacity = opacity;
                        img.style.transform = `translateX(${x}px) scale(${scale})`;
                    });
                }
            } else { 
                /* RESET: Ensures elements return to original state if user scrolls back up. */
                bgWhite.style.opacity = 0;
                navbar.classList.remove('nav-black');
            } 
        });
    </script>
</body>
</html>
