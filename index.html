<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RESTRO</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    color: #fff;
}

body {
    background: #000;
    height: 450vh; /* Optimized */
    overflow-x: hidden;
    font-family: 'Segoe UI', sans-serif;
}

.scroll-container {
    position: fixed;
    inset: 0;
    height: 100vh;
    overflow: hidden;
}

/* ---------- BACKGROUND ---------- */

.bg-video-container {
    position: absolute;
    inset: 0;
    z-index: 1;
}

.bg-video-container video {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.video-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.55);
}

.bg-brown {
    position: absolute;
    inset: 0;
    background: #3d2b1f;
    opacity: 0;
    z-index: 3;
}

.bg-white-page {
    position: absolute;
    inset: 0;
    background: #fff;
    opacity: 0;
    z-index: 15;
    display: flex;
    justify-content: center;
    align-items: center;
    pointer-events: none;
    transition: background-color 0.4s ease;
}

/* ---------- NAV ---------- */

nav {
    position: fixed;
    top: 0;
    width: 100%;
    padding: 20px 4%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 100;
    backdrop-filter: blur(15px);
    background: rgba(255,255,255,0.05);
    transition: background 0.3s;
}

.nav-black {
    background: rgba(255,255,255,0.85);
}

.nav-black a { color: #000 !important; }

.nav-links {
    list-style: none;
    display: flex;
    gap: 40px;
}

.nav-links a {
    text-decoration: none;
    transition: transform 0.3s;
}

.nav-links a:hover {
    transform: translateY(-5px);
}

/* ---------- HERO ---------- */

.hero-content {
    position: absolute;
    inset: 0;
    z-index: 20;
}

#main-title {
    position: absolute;
    top: 25%;
    left: 4%;
    font-size: 12rem;
    font-weight: 800;
    letter-spacing: 15px;
    white-space: nowrap;
    will-change: transform, opacity;
}

#sub-text {
    position: absolute;
    bottom: 15%;
    right: 8%;
    max-width: 450px;
    font-weight: 700;
    text-transform: uppercase;
    text-align: right;
    will-change: transform, opacity;
}

/* ---------- WHY SECTION ---------- */

#why-text {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    font-size: 8rem;
    font-family: Impact, sans-serif;
    color: #3d2b1f;
    opacity: 0;
    z-index: 20;
    will-change: transform, opacity;
}

.slideshow-container {
    position: absolute;
    inset: 0;
    z-index: 18;
    display: flex;
    justify-content: center;
    align-items: center;
}

.slide-img {
    position: absolute;
    width: 320px;
    height: 240px;
    object-fit: cover;
    border-radius: 10px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.3);
    opacity: 0;
    will-change: transform, opacity;
}

/* ---------- SCROLL INDICATOR ---------- */

.scroll-indicator {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.8rem;
    opacity: 0.5;
    z-index: 100;
}
</style>
</head>

<body>

<div class="scroll-indicator">Scroll Down</div>

<nav id="navbar">
    <ul class="nav-links">
        <li><a href="#">Home</a></li>
        <li><a href="#">Services</a></li>
        <li><a href="#">About</a></li>
    </ul>
</nav>

<div class="scroll-container">

    <div class="bg-video-container">
        <video autoplay muted loop playsinline>
            <source src="Food Reel - Darío Idoate.mp4" type="video/mp4">
        </video>
        <div class="video-overlay"></div>
    </div>

    <div class="bg-brown" id="bgBrown"></div>

    <div class="bg-white-page" id="bgWhite">
        <h2 id="why-text">WHY WE EXIST ?</h2>
        <div class="slideshow-container">
            <img src="https://images.unsplash.com/photo-1514362545857-3bc16c4c7d1b?q=80&w=800" class="slide-img" id="img1">
            <img src="https://images.unsplash.com/photo-1559339352-11d035aa65de?q=80&w=800" class="slide-img" id="img2">
            <img src="https://images.unsplash.com/photo-1550966841-3ee7adac1af8?q=80&w=800" class="slide-img" id="img3">
        </div>
    </div>

    <div class="hero-content">
        <h1 id="main-title">RESTRO</h1>
        <p id="sub-text">Peak Hours Should Be Your<br>Most Profitable ,Not Most Chaotic</p>
    </div>

</div>

<script>
const title = document.getElementById('main-title');
const subText = document.getElementById('sub-text');
const bgBrown = document.getElementById('bgBrown');
const bgWhite = document.getElementById('bgWhite');
const whyText = document.getElementById('why-text');
const navbar = document.getElementById('navbar');
const imgs = [
    document.getElementById('img1'),
    document.getElementById('img2'),
    document.getElementById('img3')
];

let ticking = false;

window.addEventListener('scroll', () => {
    if (!ticking) {
        requestAnimationFrame(updateScroll);
        ticking = true;
    }
});

function updateScroll() {

    const scrollY = window.scrollY;
    const maxScroll = document.documentElement.scrollHeight - window.innerHeight;
    const percent = scrollY / maxScroll;

    /* ---------- PHASE 1 ---------- */
    const p1 = Math.min(percent * 3.2, 1);

    title.style.transform =
        `translateY(${-p1 * 150}px) scale(${1 - p1 * 0.85})`;

    title.style.opacity = 1 - p1;
    bgBrown.style.opacity = p1;

    subText.style.transform =
        `translate(${-p1 * 42}vw, ${-p1 * 35}vh) scale(${1 + p1 * 1.5})`;

    /* ---------- PHASE 2 ---------- */
    if (percent > 0.5) {
        const p3 = Math.min((percent - 0.5) / 0.3, 1);

        bgWhite.style.opacity = p3;
        subText.style.opacity = 1 - p3 * 2;
        whyText.style.opacity = p3;

        const slideX = -p3 * 400;
        const slideY = -p3 * 200;
        const scale = 5 - p3 * 4;

        whyText.style.transform =
            `translate(-50%, -50%) translate(${slideX}px, ${slideY}px) scale(${scale})`;

        navbar.classList.toggle('nav-black', p3 > 0.5);

        /* ---------- IMAGE PHASE ---------- */
        if (percent > 0.65) {
            const imgPercent = Math.min((percent - 0.65) / 0.3, 1);

            imgs.forEach((img, i) => {
                const targetX = [-380, 0, 380][i];
                const x = targetX * imgPercent;
                img.style.opacity = imgPercent;
                img.style.transform =
                    `translate(${x}px, 0) scale(${0.2 + imgPercent})`;
            });
        }

    } else {
        bgWhite.style.opacity = 0;
        whyText.style.opacity = 0;
        subText.style.opacity = 1;
        navbar.classList.remove('nav-black');
    }

    ticking = false;
}
</script>

</body>
</html>
