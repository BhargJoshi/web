<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RESTRO</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box; 
            color: #ffffff; 
        }

        body {
            background-color: #000;
            height: 600vh; /* Increased for smoother scroll distribution */
            overflow-x: hidden; 
            font-family: 'Segoe UI', sans-serif; 
        }

        .scroll-container {
            position: fixed;
            top: 0;
            left: 0; 
            width: 100%; 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            overflow: hidden;
        }

        .bg-video-container {
            position: absolute;
            top: 0;
            left: 0; 
            width: 100%; 
            height: 100%; 
            z-index: 1; 
        }

        .bg-video-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.5);
        }

        .bg-brown {
            position: absolute;
            top: 0;
            left: 0; 
            width: 100%; 
            height: 100%; 
            background-color: #3d2b1f; 
            z-index: 3; 
            opacity: 0;
        }

        .bg-white-page {
            position: absolute;
            top: 0;
            left: 0; 
            width: 100%; 
            height: 100%; 
            background-color: #ffffff; 
            z-index: 15; 
            opacity: 0; 
            pointer-events: none;
        }

        /* --- FIXED POSITIONING LOGIC --- */
        #why-text {
            color: #3d2b1f;
            font-family: 'Impact', 'Arial Black', sans-serif;
            font-weight: 900; 
            text-transform: uppercase; 
            white-space: nowrap; 
            opacity: 0;
            position: absolute;
            /* Root Anchor: Visual Center */
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%) scale(5);
            font-size: 6rem;
            will-change: transform, opacity;
            z-index: 20;
        }

        #sub-text {
            position: absolute;
            /* Root Anchor: Visual Center */
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%) scale(1);
            font-size: 1.4rem;
            font-family: 'Segoe UI', sans-serif;
            font-weight: 700; 
            width: 80%;
            max-width: 600px; 
            line-height: 1.4; 
            text-transform: uppercase;
            text-align: center;
            will-change: transform, opacity;
            z-index: 20;
            opacity: 0; /* Start hidden until typewriter */
        }

        #main-title {
            position: absolute;
            top: 25%;
            left: 4%;
            font-size: 12rem;
            font-weight: 800; 
            letter-spacing: 15px; 
            white-space: nowrap; 
            will-change: transform, opacity;
            transform-origin: left top;
            z-index: 20;
        }

        nav {
            position: fixed;
            top: 0;
            width: 100%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 20px 4%; 
            z-index: 100;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px); 
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.5s ease;
        }

        .brand-container { display: flex; align-items: center; gap: 15px; }
        .brand-logo { height: 35px; opacity: 0; transition: 0.3s; }
        #nav-title-small { font-size: 1.5rem; font-weight: 800; opacity: 0; }

        .nav-links { list-style: none; display: flex; gap: 40px; margin-right: 40px; }
        .nav-links a { text-decoration: none; font-weight: 500; transition: 0.3s; }

        .nav-black { background: rgba(255, 255, 255, 0.9) !important; }
        .nav-black a, .nav-black #nav-title-small { color: #000 !important; }
        .nav-black .brand-logo { filter: invert(1); }

        .slideshow-container {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0; left: 0;
            z-index: 18;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .slide-img {
            position: absolute;
            width: 320px;
            height: 240px;
            object-fit: cover;
            border-radius: 10px;
            opacity: 0;
        }
    </style>
</head>
<body>

    <nav id="navbar">
        <div class="brand-container">
            <img src="ex.jpg" alt="Logo" class="brand-logo" id="navLogo"> 
            <span id="nav-title-small">RESTRO</span>
        </div>
        <ul class="nav-links">
            <li><a href="#">Home</a></li> 
            <li><a href="#">Services</a></li> 
            <li><a href="#">About</a></li>
        </ul>
    </nav>

    <div class="scroll-container"> 
        <div class="bg-video-container">
            <video autoplay muted loop playsinline id="bgVideo">
                <source src="Food Reel - Darío Idoate.mp4" type="video/mp4">
            </video>
        </div>
        
        <div class="bg-brown" id="bgBrown"></div> 
        
        <div class="bg-white-page" id="bgWhite"> 
            <h2 id="why-text">WHY WE EXIST ?</h2> 
            <div class="slideshow-container">
                <img src="https://images.unsplash.com/photo-1514362545857-3bc16c4c7d1b?q=80&w=800" class="slide-img" id="img1">
                <img src="https://images.unsplash.com/photo-1559339352-11d035aa65de?q=80&w=800" class="slide-img" id="img2">
                <img src="https://images.unsplash.com/photo-1550966841-3ee7adac1af8?q=80&w=800" class="slide-img" id="img3">
            </div>
        </div>

        <h1 id="main-title"></h1>
        <p id="sub-text"></p> 
    </div>

    <script>
        const titleText = "RESTRO";
        const taglineText = "Peak Hours Should Be Your<br>Most Profitable, Not Most Chaotic";

        function typeWriter(elementId, text, speed, callback) {
            let i = 0;
            const element = document.getElementById(elementId);
            element.style.opacity = 1;
            function type() {
                if (i < text.length) {
                    element.innerHTML += text.substring(i, i+1) === "<" ? (i+=4, "<br>") : text.charAt(i++);
                    setTimeout(type, speed);
                } else if (callback) callback();
            }
            type();
        }

        window.addEventListener('load', () => {
            window.scrollTo(0, 0);
            typeWriter("main-title", titleText, 100, () => {
                typeWriter("sub-text", taglineText, 40);
            });
        });

        window.addEventListener('scroll', () => {
            window.requestAnimationFrame(updateAnimations);
        });

        function updateAnimations() {
            const scrollY = window.scrollY;
            const vh = window.innerHeight;
            const maxScroll = document.documentElement.scrollHeight - vh;
            const progress = scrollY / maxScroll;

            const title = document.getElementById('main-title');
            const subText = document.getElementById('sub-text');
            const bgBrown = document.getElementById('bgBrown');
            const bgWhite = document.getElementById('bgWhite');
            const whyText = document.getElementById('why-text');
            const navbar = document.getElementById('navbar');

            // 1. MAIN TITLE TO NAV (0% - 20%)
            const pTitle = Math.min(progress * 5, 1);
            title.style.transform = `translateY(${(28 - (vh * 0.25)) * pTitle}px) scale(${1 - (pTitle * 0.88)})`;
            title.style.opacity = 1 - pTitle;
            document.getElementById('navLogo').style.opacity = pTitle > 0.9 ? 1 : 0;
            document.getElementById('nav-title-small').style.opacity = pTitle > 0.9 ? 1 : 0;

            // 2. TAGLINE CENTERING & HOLD (15% - 50%)
            // We use a broader range for the tagline to prevent "drifting"
            bgBrown.style.opacity = Math.min(progress * 4, 1);
            
            let subScale = 1;
            let subOpacity = 1;

            if (progress < 0.2) {
                // Moving into view from initial typewriter pos (bottom right intent)
                // Since it is anchored center, we just scale it up
                subScale = 1 + (progress * 5);
            } else if (progress >= 0.2 && progress <= 0.45) {
                // THE HOLD: Stay centered and fixed. Very mild shrink.
                const holdProgress = (progress - 0.2) / 0.25;
                subScale = 2.0 - (holdProgress * 0.2); // 2.0 -> 1.8
                subOpacity = 1;
            } else {
                // EXIT: Fade as white page arrives
                const exitProgress = (progress - 0.45) / 0.1;
                subScale = 1.8 - (exitProgress * 0.5);
                subOpacity = 1 - exitProgress;
            }
            // Always maintain translate(-50%, -50%) to stay centered
            subText.style.transform = `translate(-50%, -50%) scale(${subScale})`;
            subText.style.opacity = Math.max(0, subOpacity);

            // 3. WHY WE EXIST (45% - 80%)
            if (progress > 0.45) {
                const pWhite = Math.min((progress - 0.45) / 0.3, 1);
                bgWhite.style.opacity = pWhite;
                
                let whyScale = 5;
                let whyYOffset = 0; // Relative to center

                if (pWhite < 0.4) {
                    // Zooming in to center
                    whyScale = 5 - (pWhite / 0.4 * 4);
                } else {
                    // Holding then moving UP, but capping at navbar
                    const slideUp = (pWhite - 0.4) / 0.6;
                    whyScale = 1 - (slideUp * 0.2);
                    // -35vh ensures it stays well below the top navbar (usually 10-15vh)
                    whyYOffset = slideUp * -30; 
                }

                // Transform stacking: Base center + dynamic Y offset + dynamic scale
                whyText.style.transform = `translate(-50%, calc(-50% + ${whyYOffset}vh)) scale(${whyScale})`;
                whyText.style.opacity = Math.min(pWhite * 2, 1);

                // Navbar Color Flip
                if (pWhite > 0.8) {
                    navbar.classList.remove('nav-black');
                    bgWhite.style.backgroundColor = "#3d2b1f";
                    whyText.style.color = "#ffffff";
                } else {
                    navbar.classList.add('nav-black');
                    bgWhite.style.backgroundColor = "#ffffff";
                    whyText.style.color = "#3d2b1f";
                }
            } else {
                bgWhite.style.opacity = 0;
                navbar.classList.remove('nav-black');
            }
        }
    </script>
</body>
</html>
