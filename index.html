<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RESTRO</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box; 
            color: #ffffff; 
        }

        body {
            background-color: #000;
            height: 500vh;
            overflow-x: hidden; 
            font-family: 'Segoe UI', sans-serif; 
        }

        .scroll-container {
            position: fixed;
            top: 0;
            left: 0; 
            width: 100%; 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            overflow: hidden;
        }

        .bg-video-container {
            position: absolute;
            top: 0;
            left: 0; 
            width: 100%; 
            height: 100%; 
            z-index: 1; 
            overflow: hidden;
        }

        .bg-video-container video {
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            object-fit: cover;
            filter: brightness(0.8);
            will-change: transform;
        }

        .video-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.2);
            z-index: 2;
        }

        .bg-brown {
            position: absolute;
            top: 0;
            left: 0; 
            width: 100%; 
            height: 100%; 
            background-color: #3d2b1f; 
            z-index: 3; 
            opacity: 0;
        }

        .bg-white-page {
            position: absolute;
            top: 0;
            left: 0; 
            width: 100%; 
            height: 100%; 
            background-color: #ffffff; 
            z-index: 15; 
            opacity: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            pointer-events: none;
            transition: background-color 0.6s ease;
        }

        #why-text {
            color: #3d2b1f;
            font-family: 'Impact', 'Arial Black', sans-serif;
            font-weight: 900; 
            text-transform: uppercase; 
            white-space: nowrap; 
            opacity: 0;
            position: absolute;
            left: 50%;
            top: 50%;
            font-size: 6rem;
            transform: translate(-50%, -50%) scale(5);
            will-change: transform, opacity;
            transition: color 0.4s ease;
            z-index: 20;
        }

        .slideshow-container {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 18;
            pointer-events: none;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .slide-img {
            position: absolute;
            width: 320px;
            height: 240px;
            object-fit: cover;
            border-radius: 10px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            opacity: 0;
            will-change: transform, opacity;
        }

        nav {
            position: fixed;
            top: 0;
            width: 100%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 20px 4%; 
            z-index: 100;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            transition: background 0.5s ease, border-bottom 0.5s ease;
        }

        .brand-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .brand-logo {
            height: 35px;
            width: auto;
            opacity: 0; 
            transition: filter 0.3s ease, opacity 0.3s ease;
        }

        #nav-title-small {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: 2px;
            opacity: 0;
            transition: color 0.3s ease, opacity 0.3s x;
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 40px; 
            margin-right: 40px; 
        }

        .nav-links li { position: relative; }
        .nav-links a {
            text-decoration: none;
            font-weight: 500;
            font-size: 1.1rem; 
            display: inline-block; 
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), color 0.3s;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -5px;
            left: 0;
            background-color: currentColor;
            transition: width 0.3s ease;
        }

        .nav-links a:hover { transform: translateY(-5px); }
        .nav-links a:hover::after { width: 100%; }

        .nav-black {
            background: rgba(255, 255, 255, 0.9) !important;
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
        }
        .nav-black a { color: #000 !important; }
        .nav-black .menu-toggle div { background-color: #000 !important; }
        .nav-black .brand-logo { filter: invert(1); }
        .nav-black #nav-title-small { color: #000; }

        .menu-toggle {
            cursor: pointer;
            display: flex;
            flex-direction: column; 
            gap: 6px; 
            z-index: 1000; 
            transition: 0.3s;
        }

        .menu-toggle div {
            width: 30px;
            height: 3px;
            background-color: white; 
            transition: all 0.4s ease; 
        }

        .menu-toggle.open #line1 { transform: rotate(45deg) translate(6px, 6px); }
        .menu-toggle.open #line2 { opacity: 0; transform: translateX(-20px); }
        .menu-toggle.open #line3 { transform: rotate(-45deg) translate(7px, -7px); }

        .side-menu {
            position: fixed;
            top: 0;
            right: -100%; 
            width: 350px; 
            height: 100vh; 
            background: rgba(20, 20, 20, 0.98); 
            backdrop-filter: blur(15px); 
            z-index: 999; 
            display: flex;
            flex-direction: column;
            justify-content: center; 
            padding: 60px; 
            transition: 0.6s cubic-bezier(0.77, 0, 0.175, 1);
        }

        .side-menu.active { right: 0; }
        .side-menu a {
            text-decoration: none;
            font-size: 2.2rem;
            margin: 15px 0; 
            font-weight: 700; 
            opacity: 0; 
            transform: translateX(50px); 
            transition: 0.4s;
        }
        .side-menu.active a { opacity: 1; transform: translateX(0); }
        .side-menu a:hover { color: #d2a679; letter-spacing: 2px; }

        .hero-content {
            position: relative;
            width: 100%;
            height: 100%; 
            z-index: 20; 
            pointer-events: none;
        }

        #main-title {
            position: absolute;
            top: 25%;
            left: 4%;
            font-size: 12rem;
            font-weight: 800; 
            letter-spacing: 15px; 
            white-space: nowrap; 
            will-change: transform, opacity;
            transform-origin: left top;
        }

        #sub-text {
            position: absolute;
            bottom: 15%;
            right: 8%;
            font-size: 1.4rem;
            font-family: 'Kollektif', 'Segoe UI', sans-serif;
            font-weight: 700; 
            max-width: 450px; 
            line-height: 1.4; 
            text-transform: uppercase;
            text-align: right;
            will-change: transform, opacity;
            transform-origin: center center;
        }

        .scroll-indicator {
            position: fixed;
            bottom: 20px;
            left: 50%; 
            transform: translateX(-50%); 
            font-size: 0.8rem; 
            opacity: 0.5; 
            z-index: 100; 
            text-transform: uppercase; 
            letter-spacing: 2px;
            transition: color 0.4s ease;
        }
    </style>
</head>
<body>

    <div class="scroll-indicator" id="scrollTag">Scroll Down</div> 

    <nav id="navbar">
        <div class="brand-container">
            <img src="ex.jpg" alt="Logo" class="brand-logo" id="navLogo"> 
            <span id="nav-title-small">RESTRO</span>
        </div>
        
        <div style="display: flex; align-items: center;">
            <ul class="nav-links">
                <li><a href="#">Home</a></li> 
                <li><a href="#">Services</a></li> 
                <li><a href="#">About</a></li>
            </ul>
            <div class="menu-toggle" id="menuToggle" onclick="toggleMenu()"> 
                <div id="line1"></div> 
                <div id="line2"></div> 
                <div id="line3"></div>
            </div> 
        </div>
    </nav>

    <div class="side-menu" id="sideMenu"> 
        <a href="#" class="close-link" onclick="toggleMenu()">✕ Close Menu</a> 
        <a href="#" onclick="toggleMenu()">Home</a>
        <a href="#" onclick="toggleMenu()">Services</a>
        <a href="#" onclick="toggleMenu()">About</a>
        <a href="#" onclick="toggleMenu()">Reservations</a>
        <a href="#" onclick="toggleMenu()">Contact</a>
    </div>

    <div class="scroll-container"> 
        <div class="bg-video-container">
            <video autoplay muted loop playsinline id="bgVideo">
                <source src="Food Reel - Darío Idoate.mp4" type="video/mp4">
            </video>
            <div class="video-overlay"></div>
        </div>
        
        <div class="bg-brown" id="bgBrown"></div> 
        
        <div class="bg-white-page" id="bgWhite"> 
            <h2 id="why-text">WHY WE EXIST ?</h2> 
            
            <div class="slideshow-container">
                <img src="https://images.unsplash.com/photo-1514362545857-3bc16c4c7d1b?q=80&w=800" class="slide-img" id="img1">
                <img src="https://images.unsplash.com/photo-1559339352-11d035aa65de?q=80&w=800" class="slide-img" id="img2">
                <img src="https://images.unsplash.com/photo-1550966841-3ee7adac1af8?q=80&w=800" class="slide-img" id="img3">
            </div>
        </div>

        <div class="hero-content" id="heroContent"> 
           <h1 id="main-title"></h1>
           <p id="sub-text"></p> 
        </div>
    </div>

    <script>
        window.onbeforeunload = function () { window.scrollTo(0, 0); };

        const titleText = "RESTRO";
        const taglineText = "Peak Hours Should Be Your<br>Most Profitable ,Not Most Chaotic";

        function typeWriter(elementId, text, speed, callback) {
            let i = 0;
            const element = document.getElementById(elementId);
            function type() {
                if (i < text.length) {
                    if (text.substring(i, i + 4) === "<br>") {
                        element.innerHTML += "<br>";
                        i += 4;
                    } else {
                        element.innerHTML += text.charAt(i);
                        i++;
                    }
                    setTimeout(type, speed);
                } else if (callback) { callback(); }
            }
            type();
        }

        window.addEventListener('load', () => {
            window.scrollTo(0, 0);
            const video = document.getElementById('bgVideo');
            if (video) video.play().catch(() => {});
            typeWriter("main-title", titleText, 150, () => {
                typeWriter("sub-text", taglineText, 50);
            });
        });

        function toggleMenu() {
            document.getElementById('sideMenu').classList.toggle('active');
            document.getElementById('menuToggle').classList.toggle('open');
        }

        let ticking = false;
        window.addEventListener('scroll', () => {
            if (!ticking) {
                window.requestAnimationFrame(() => {
                    updateAnimations();
                    ticking = false;
                });
                ticking = true;
            }
        });

        function updateAnimations() {
            const scrollY = window.scrollY;
            const maxScroll = document.documentElement.scrollHeight - window.innerHeight;
            const scrollPercent = Math.max(0, Math.min(scrollY / maxScroll, 1));
            
            const title = document.getElementById('main-title');
            const subText = document.getElementById('sub-text');
            const bgBrown = document.getElementById('bgBrown');
            const bgWhite = document.getElementById('bgWhite');
            const whyText = document.getElementById('why-text');
            const navbar = document.getElementById('navbar');
            const navLogo = document.getElementById('navLogo');
            const navTitleSmall = document.getElementById('nav-title-small');

            // --- SECTION 1: MAIN TITLE MOVES TO NAV ---
            const p1Percent = Math.min(scrollPercent * 4, 1);
            const titleScale = 1 - (p1Percent * 0.88);
            const startY = window.innerHeight * 0.25;
            const endY = 28;
            const moveY = (endY - startY) * p1Percent;
            title.style.transform = `translateY(${moveY}px) scale(${titleScale})`;
            title.style.letterSpacing = `${15 * (1 - p1Percent)}px`;
            title.style.opacity = 1 - (p1Percent * 0.9);

            if (p1Percent >= 0.95) {
                navLogo.style.opacity = 1;
                navTitleSmall.style.opacity = 1;
                title.style.opacity = 0;
            } else {
                navLogo.style.opacity = 0;
                navTitleSmall.style.opacity = 0;
            }

            // --- SECTION 2: SUB-TEXT CENTER & SHRINK ---
            bgBrown.style.opacity = Math.min(scrollPercent * 3, 1);
            const centerProgress = Math.min(scrollPercent * 2, 1); 
            const subX = centerProgress * -42; 
            const subY = centerProgress * -35;
            let subScale = 1;

            if (scrollPercent > 0.2) {
                // Modified for Change 1: Shrink less and slower (only down to 0.75)
                const shrinkRange = Math.min((scrollPercent - 0.2) / 0.25, 1);
                subScale = 2.5 - (shrinkRange * 1.75); 
            } else {
                subScale = 1 + (scrollPercent * 7.5);
            }

            subText.style.textAlign = centerProgress > 0.8 ? 'center' : 'right';
            subText.style.transform = `translate(${subX}vw, ${subY}vh) scale(${subScale})`;
            
            let subTextOpacity = 1;
            if (scrollPercent > 0.35) {
                subTextOpacity = 1 - (scrollPercent - 0.35) * 10;
            }
            subText.style.opacity = Math.max(0, subTextOpacity);

            // --- SECTION 3: WHITE PAGE & "WHY WE EXIST" ---
            if (scrollPercent > 0.45) { 
                const p3Percent = Math.min((scrollPercent - 0.45) / 0.25, 1);
                bgWhite.style.opacity = Math.min(p3Percent * 2, 1);
                whyText.style.opacity = Math.min(p3Percent * 3, 1);

                let currentScale = 5;
                let currentX = 0;
                let currentY = 0;
                let textFixed = false;

                if (p3Percent < 0.3) {
                    currentScale = 5 - (p3Percent / 0.3 * 4);
                } else if (p3Percent < 0.6) {
                    currentScale = 1;
                } else {
                    const slideFactor = (p3Percent - 0.6) / 0.4;
                    // Modified for Change 2: Adjusted X and Y to keep space from top/left
                    currentX = slideFactor * -40; 
                    currentY = slideFactor * -35;
                    currentScale = 1 - (slideFactor * 0.5);
                    if(slideFactor >= 1) textFixed = true; 
                }

                whyText.style.transform = `translate(calc(-50% + ${currentX}vw), calc(-50% + ${currentY}vh)) scale(${currentScale})`;
                
                if (p3Percent >= 0.9) {
                    bgWhite.style.backgroundColor = "#3d2b1f";
                    whyText.style.color = "#ffffff";
                    navbar.classList.remove('nav-black');
                } else {
                    bgWhite.style.backgroundColor = "#ffffff";
                    whyText.style.color = "#3d2b1f";
                    navbar.classList.add('nav-black');
                }

                const imgs = [document.getElementById('img1'), document.getElementById('img2'), document.getElementById('img3')];
                const targetX = [-380, 0, 380];
                
                if (textFixed && scrollPercent > 0.72) {
                    const imgProgress = Math.min((scrollPercent - 0.72) / 0.25, 1);
                    imgs.forEach((img, i) => {
                        const start = i * 0.33;
                        const end = (i + 1) * 0.33;
                        
                        if (imgProgress > start) {
                            const local = Math.min((imgProgress - start) / 0.33, 1);
                            img.style.opacity = local;
                            let x = local > 0.7 ? targetX[i] * ((local - 0.7) / 0.3) : 0;
                            let scale = 1.5 - (local > 0.7 ? (local - 0.7) / 0.3 * 0.5 : 0);
                            img.style.transform = `translateX(${x}px) scale(${scale})`;
                        } else {
                            img.style.opacity = 0;
                        }
                    });
                } else {
                    imgs.forEach(img => img.style.opacity = 0);
                }
            } else { 
                bgWhite.style.opacity = 0;
                whyText.style.opacity = 0;
                navbar.classList.remove('nav-black');
            } 
        }
    </script>
</body>
</html>
