<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RESTRO | Premium Experience</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box; 
            color: #ffffff; 
        }

        html {
            /* Enable Smooth Snapping */
            scroll-snap-type: y proximity;
            scroll-behavior: smooth;
        }

        body {
            background-color: #000;
            height: 500vh; /* Optimized height for better pacing */
            overflow-x: hidden; 
            font-family: 'Segoe UI', sans-serif; 
        }

        /* Snap Points */
        .snap-point {
            position: absolute;
            height: 100vh;
            width: 100%;
            scroll-snap-align: start;
            pointer-events: none;
        }

        #snap-1 { top: 0; }
        #snap-2 { top: 200vh; } /* Snaps to Why We Exist */
        #snap-3 { top: 400vh; } /* Snaps to Image Sequence */

        .scroll-container {
            position: fixed;
            top: 0;
            left: 0; 
            width: 100%; 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            overflow: hidden;
        }

        .bg-video-container {
            position: absolute;
            top: 0;
            left: 0; 
            width: 100%; 
            height: 100%; 
            z-index: 1; 
            overflow: hidden;
        }

        .bg-video-container video {
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            object-fit: cover;
            filter: brightness(0.6);
        }

        .bg-brown {
            position: absolute;
            top: 0;
            left: 0; 
            width: 100%; 
            height: 100%; 
            background-color: #3d2b1f; 
            z-index: 3; 
            opacity: 0;
            will-change: opacity;
        }

        .bg-white-page {
            position: absolute;
            top: 0;
            left: 0; 
            width: 100%; 
            height: 100%; 
            background-color: #ffffff; 
            z-index: 15; 
            opacity: 0; 
            pointer-events: none;
            will-change: opacity, background-color;
        }

        #why-text {
            color: #3d2b1f;
            font-family: 'Impact', 'Arial Black', sans-serif;
            font-weight: 900; 
            text-transform: uppercase; 
            white-space: nowrap; 
            opacity: 0;
            position: absolute;
            left: 50%;
            top: 50%;
            font-size: 8rem;
            transform: translate(-50%, -50%) scale(5);
            will-change: transform, opacity, color;
            z-index: 20;
        }

        .slide-img {
            position: absolute;
            width: 320px;
            height: 240px;
            object-fit: cover;
            border-radius: 10px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            opacity: 0;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            will-change: transform, opacity;
            z-index: 18;
        }

        nav {
            position: fixed;
            top: 0;
            width: 100%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 20px 4%; 
            z-index: 100;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            transition: background 0.4s ease, border-bottom 0.4s ease;
        }

        .nav-black {
            background: rgba(255, 255, 255, 0.9) !important;
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
        }

        .nav-black * { color: #000 !important; }
        .nav-black .menu-toggle div { background-color: #000 !important; }
        .nav-black .brand-logo { filter: invert(1); }

        .brand-logo {
            height: 35px;
            width: auto;
            opacity: 0; 
            transition: opacity 0.3s ease;
        }

        #nav-title-small {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: 2px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 40px; 
            margin-right: 40px; 
        }

        .nav-links a {
            text-decoration: none;
            font-weight: 500;
            font-size: 1.1rem; 
            transition: transform 0.3s ease;
        }

        .menu-toggle {
            cursor: pointer;
            display: flex;
            flex-direction: column; 
            gap: 6px; 
        }

        .menu-toggle div {
            width: 30px;
            height: 3px;
            background-color: white; 
            transition: all 0.4s ease; 
        }

        .side-menu {
            position: fixed;
            top: 0;
            right: -100%; 
            width: 350px; 
            height: 100vh; 
            background: rgba(20, 20, 20, 0.98); 
            backdrop-filter: blur(15px); 
            z-index: 999; 
            display: flex;
            flex-direction: column;
            justify-content: center; 
            padding: 60px; 
            transition: 0.6s cubic-bezier(0.77, 0, 0.175, 1);
        }

        .side-menu.active { right: 0; }

        #main-title {
            position: absolute;
            top: 25%;
            left: 4%;
            font-size: 12rem;
            font-weight: 800; 
            letter-spacing: 15px; 
            white-space: nowrap; 
            will-change: transform, opacity;
        }

        #sub-text {
            position: absolute;
            bottom: 15%;
            right: 8%;
            font-size: 1.4rem;
            font-weight: 700; 
            max-width: 450px; 
            line-height: 1.4; 
            text-transform: uppercase;
            text-align: right;
            will-change: transform, opacity;
        }

        .scroll-indicator {
            position: fixed;
            bottom: 20px;
            left: 50%; 
            transform: translateX(-50%); 
            font-size: 0.8rem; 
            opacity: 0.5; 
            z-index: 100; 
            text-transform: uppercase; 
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="snap-point" id="snap-1"></div>
    <div class="snap-point" id="snap-2"></div>
    <div class="snap-point" id="snap-3"></div>

    <div class="scroll-indicator" id="scrollTag">Scroll Down</div> 

    <nav id="navbar">
        <div class="brand-container" style="display: flex; align-items: center; gap: 15px;">
            <img src="ex.jpg" alt="Logo" class="brand-logo" id="navLogo"> 
            <span id="nav-title-small">RESTRO</span>
        </div>
        
        <div style="display: flex; align-items: center;">
            <ul class="nav-links">
                <li><a href="#">Home</a></li> 
                <li><a href="#">Services</a></li> 
                <li><a href="#">About</a></li>
            </ul>
            <div class="menu-toggle" id="menuToggle" onclick="toggleMenu()"> 
                <div></div><div></div><div></div>
            </div> 
        </div>
    </nav>

    <div class="side-menu" id="sideMenu"> 
        <a href="#" onclick="toggleMenu()">✕ Close Menu</a> 
        <a href="#">Home</a>
        <a href="#">Services</a>
        <a href="#">About</a>
        <a href="#">Reservations</a>
        <a href="#">Contact</a>
    </div>

    <div class="scroll-container"> 
        <div class="bg-video-container">
            <video autoplay muted loop playsinline id="bgVideo">
                <source src="Food Reel - Darío Idoate.mp4" type="video/mp4">
            </video>
        </div>
        
        <div class="bg-brown" id="bgBrown"></div> 
        <div class="bg-white-page" id="bgWhite"></div>
        <h2 id="why-text">WHY WE EXIST ?</h2> 
        
        <img src="https://images.unsplash.com/photo-1514362545857-3bc16c4c7d1b?q=80&w=800" class="slide-img" id="img1">
        <img src="https://images.unsplash.com/photo-1559339352-11d035aa65de?q=80&w=800" class="slide-img" id="img2">
        <img src="https://images.unsplash.com/photo-1550966841-3ee7adac1af8?q=80&w=800" class="slide-img" id="img3">

        <div class="hero-content"> 
            <h1 id="main-title">RESTRO</h1>
            <p id="sub-text">Peak Hours Should Be Your<br>Most Profitable, Not Most Chaotic</p> 
        </div>
    </div>

    <script>
        let ticking = false;
        const elements = {
            title: document.getElementById('main-title'),
            subText: document.getElementById('sub-text'),
            bgBrown: document.getElementById('bgBrown'),
            bgWhite: document.getElementById('bgWhite'),
            whyText: document.getElementById('why-text'),
            navbar: document.getElementById('navbar'),
            navLogo: document.getElementById('navLogo'),
            navTitle: document.getElementById('nav-title-small'),
            scrollTag: document.getElementById('scrollTag'),
            imgs: [document.getElementById('img1'), document.getElementById('img2'), document.getElementById('img3')]
        };

        window.addEventListener('scroll', () => {
            if (!ticking) {
                window.requestAnimationFrame(() => {
                    handleAnimations();
                    ticking = false;
                });
                ticking = true;
            }
        });

        function handleAnimations() {
            const scrollY = window.scrollY;
            const maxScroll = document.documentElement.scrollHeight - window.innerHeight;
            const scrollPercent = Math.max(0, Math.min(scrollY / maxScroll, 1));

            // Phase 1: Main Title Fade & Shrink (0 - 25%)
            const p1 = Math.min(scrollPercent / 0.25, 1);
            elements.title.style.opacity = 1 - p1;
            elements.title.style.transform = `scale(${1 - p1 * 0.3}) translateY(${-p1 * 100}px)`;
            
            // Nav logo appearance
            const navAlpha = scrollPercent > 0.1 ? Math.min((scrollPercent - 0.1) * 5, 1) : 0;
            elements.navLogo.style.opacity = navAlpha;
            elements.navTitle.style.opacity = navAlpha;

            // Phase 2: Tagline Center (0 - 40%)
            const p2 = Math.min(scrollPercent / 0.4, 1);
            elements.subText.style.transform = `translate(${-p2 * 38}vw, ${-p2 * 35}vh) scale(${1 + p2 * 0.5})`;
            elements.bgBrown.style.opacity = Math.min(p2 * 1.5, 1);

            // Phase 3: White Screen & Why We Exist (45% - 75%)
            if (scrollPercent > 0.4) {
                const p3 = Math.min((scrollPercent - 0.4) / 0.35, 1);
                elements.bgWhite.style.opacity = p3;
                elements.subText.style.opacity = 1 - (p3 * 3);
                
                // Why We Exist scaling
                const whyScale = Math.max(5 - (p3 * 4), 1);
                elements.whyText.style.opacity = Math.min(p3 * 2, 1);
                elements.whyText.style.transform = `translate(-50%, -50%) scale(${whyScale})`;

                // Navbar color transition
                if (p3 > 0.8) {
                    elements.navbar.classList.add('nav-black');
                    elements.scrollTag.style.color = "#000";
                    
                    // Final transition to dark background at very end
                    if (p3 > 0.98) {
                        elements.bgWhite.style.backgroundColor = "#3d2b1f";
                        elements.whyText.style.color = "#ffffff";
                        elements.navbar.classList.remove('nav-black');
                        elements.scrollTag.style.color = "#fff";
                    } else {
                        elements.bgWhite.style.backgroundColor = "#ffffff";
                        elements.whyText.style.color = "#3d2b1f";
                    }
                } else {
                    elements.navbar.classList.remove('nav-black');
                    elements.scrollTag.style.color = "#fff";
                }
            }

            // Phase 4: Smooth Image Sequence (70% - 98%)
            if (scrollPercent > 0.7) {
                const p4 = Math.min((scrollPercent - 0.7) / 0.28, 1);
                const spread = 25; // vw distance
                
                elements.imgs.forEach((img, i) => {
                    const start = i * 0.2;
                    const end = start + 0.4;
                    const imgP = Math.max(0, Math.min((p4 - start) / (end - start), 1));
                    
                    // Smooth bell curve for opacity
                    img.style.opacity = Math.sin(imgP * Math.PI);
                    
                    // Movement: Start center, move to spread position
                    const xMove = (i - 1) * spread * imgP;
                    img.style.transform = `translate(calc(-50% + ${xMove}vw), -50%) scale(${0.8 + imgP * 0.4})`;
                });
            } else {
                elements.imgs.forEach(img => img.style.opacity = 0);
            }
        }

        function toggleMenu() {
            document.getElementById('sideMenu').classList.toggle('active');
        }

        window.onload = () => window.scrollTo(0, 0);
    </script>
</body>
</html>
